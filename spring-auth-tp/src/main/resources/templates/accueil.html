<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SecureApp - Accueil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .barre-nav {
            background: #1a1a2e;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .barre-nav .logo {
            color: #e94560;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .barre-nav .info-session {
            color: #a8b2d8;
            font-size: 0.88rem;
        }

        .barre-nav .info-session span {
            color: #e94560;
            font-weight: 600;
        }

        .contenu {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .titre-accueil {
            color: #1a1a2e;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .sous-titre {
            color: #64748b;
            margin-bottom: 36px;
            font-size: 0.95rem;
        }

        .grille-modules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .carte-module {
            background: white;
            border-radius: 12px;
            padding: 28px 24px;
            border-left: 4px solid #e94560;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .carte-module:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .carte-module.admin {
            border-left-color: #0f3460;
        }

        .carte-module h3 {
            font-size: 1rem;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .carte-module p {
            font-size: 0.82rem;
            color: #64748b;
        }

        .badge-role {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .badge-user { background: #e8f4fd; color: #1a73e8; }
        .badge-admin { background: #fce8e6; color: #d93025; }

        .lien-deconnexion {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 18px;
            background: #1a1a2e;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.88rem;
            transition: background 0.2s;
        }

        .lien-deconnexion:hover {
            background: #e94560;
        }
    </style>
</head>
<body>
<nav class="barre-nav">
    <div class="logo">SECUREAPP</div>
    <div class="info-session">
        Connecte en tant que : <span sec:authentication="name">utilisateur</span>
    </div>
</nav>

<div class="contenu">
    <h1 class="titre-accueil">Tableau de bord</h1>
    <p class="sous-titre">Selectionnez un module pour continuer.</p>

    <div class="grille-modules">
        <a th:href="@{/espace/personnel}" class="carte-module">
            <div class="badge-role badge-user">USER / ADMIN</div>
            <h3>Espace Personnel</h3>
            <p>Acceder a votre profil et vos informations personnelles.</p>
        </a>

        <a th:href="@{/gestion/panneau}" class="carte-module admin">
            <div class="badge-role badge-admin">ADMIN uniquement</div>
            <h3>Panneau de Gestion</h3>
            <p>Administration des utilisateurs et parametres systeme.</p>
        </a>
    </div>

    <a th:href="@{/deconnexion}" class="lien-deconnexion">Se deconnecter</a>
</div>
</body>
</html>
